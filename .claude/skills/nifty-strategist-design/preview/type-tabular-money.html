<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — tabular money</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:12px;">
  <div class="ns-eyebrow">Tabular numerals · money</div>
  <div class="ns-helper">Every price/qty/P&amp;L value is tabular. Indian rupee, en-IN grouping.</div>
  <table style="border-collapse:collapse; font-feature-settings:'tnum' 1; font-variant-numeric: tabular-nums;">
    <tr style="font-size:20px; font-weight:700;">
      <td style="padding:2px 24px 2px 0;">₹10,43,250</td>
      <td style="padding:2px 24px 2px 0;" class="ns-profit">+₹4,320</td>
      <td style="padding:2px 24px 2px 0;" class="ns-loss">−₹500</td>
      <td style="padding:2px 0;" class="ns-profit">+1.69%</td>
    </tr>
    <tr style="font-size:14px; color: var(--fg-muted);">
      <td style="padding:2px 24px 2px 0;">Portfolio value</td>
      <td style="padding:2px 24px 2px 0;">Day P&amp;L</td>
      <td style="padding:2px 24px 2px 0;">INFY P&amp;L</td>
      <td style="padding:2px 0;">TCS change</td>
    </tr>
  </table>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
