<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — corner radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Radii</div>
  <div style="display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; align-items:end;">
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:54px; height:54px; background: var(--bg-muted); border:1px solid var(--border-default); border-radius:4px;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">xs</div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">4px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:54px; height:54px; background: var(--bg-muted); border:1px solid var(--border-default); border-radius:6px;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">sm</div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">6px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:54px; height:54px; background: var(--bg-muted); border:1px solid var(--border-default); border-radius:8px;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">md</div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">8px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:54px; height:54px; background: var(--bg-muted); border:1px solid var(--border-default); border-radius:12px;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">lg</div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">12px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:54px; height:54px; background: var(--bg-muted); border:1px solid var(--border-default); border-radius:16px;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">xl</div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">16px</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:54px; height:54px; background: var(--bg-muted); border:1px solid var(--border-default); border-radius:24px;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">2xl</div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">24px</div>
      </div>
    
  </div>
  <div class="ns-helper">Default card radius is <strong style="color:var(--fg-strong);">lg / 12px</strong>. Elevated card: <strong style="color:var(--fg-strong);">xl / 16px</strong>. Buttons/inputs: <strong style="color:var(--fg-strong);">md / 8px</strong>.</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
