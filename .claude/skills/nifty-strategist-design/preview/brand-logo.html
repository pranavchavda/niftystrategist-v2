<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — logo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:12px;">
  <div class="ns-eyebrow">Logo</div>
  <div style="display:flex; gap:20px; align-items:center;">
    <img src="../assets/logo-192.png" alt="Nifty Strategist logo" width="80" height="80" style="border-radius: 18px;" />
    <div>
      <div style="font-size:22px; font-weight:700; color: var(--fg-strong); letter-spacing:-0.01em;">Nifty Strategist</div>
      <div class="ns-helper" style="margin-top:2px;">App icon · blue-gradient rounded square · white trending-up arrow</div>
    </div>
    <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
      <img src="../assets/logo-96.png" alt="" width="40" height="40" style="border-radius: 10px;" />
      <img src="../assets/favicon.png" alt="" width="20" height="20" style="border-radius: 4px;" />
    </div>
  </div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
