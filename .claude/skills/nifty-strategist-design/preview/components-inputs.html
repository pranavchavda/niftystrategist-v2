<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Inputs</div>
  <label class="ns-label" style="display:flex; flex-direction:column; gap:6px;">
    Search symbols
    <span style="position:relative; display:block;">
      <i data-lucide="search" style="position:absolute; left:10px; top:50%; transform:translateY(-50%); width:14px; height:14px; color: var(--fg-subtle);"></i>
      <input value="RELIANCE" style="width:100%; box-sizing:border-box; padding:8px 12px 8px 32px; border-radius: var(--radius-md); border:1px solid var(--border-strong); background: var(--bg-surface); font-size:14px; color: var(--fg-strong); font-family: var(--font-sans); outline:none;" />
    </span>
  </label>
  <label class="ns-label" style="display:flex; flex-direction:column; gap:6px;">
    Stop loss (₹)
    <input value="2,720.00" style="padding:8px 12px; border-radius: var(--radius-md); border:1px solid var(--border-strong); background: var(--bg-surface); font-size:14px; color: var(--fg-strong); font-family: var(--font-sans); font-variant-numeric: tabular-nums; outline:none;" />
  </label>
  <div class="ns-helper">8px vertical / 12px horizontal padding · 1 px zinc-300 border · blue-500 focus ring (not shown).</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
