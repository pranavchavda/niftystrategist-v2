<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — 4px scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Spacing · 4 px grid</div>
  <div style="display:flex; gap:16px; align-items:end;">
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:4px; height:4px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">4</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:8px; height:8px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">8</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:12px; height:12px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">12</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:16px; height:16px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">16</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:20px; height:20px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">20</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:24px; height:24px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">24</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:32px; height:32px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">32</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:40px; height:40px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">40</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:48px; height:48px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">48</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center;">
        <div style="width:64px; height:64px; background: var(--amber-400); border-radius:2px;"></div>
        <div style="font-size:10px; color: var(--fg-muted); font-family: var(--font-mono);">64</div>
      </div>
    
  </div>
  <div class="ns-helper">All gaps and paddings snap to multiples of 4. Dense panels use 8/12; marketing/settings use 24/32.</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
