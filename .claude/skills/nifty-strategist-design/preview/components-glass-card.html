<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — glass card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Glass card · topbar style</div>
  <div style="position:relative; height:120px; border-radius: var(--radius-md); overflow:hidden; background: linear-gradient(135deg, #4f7df7 0%, #2c5be8 100%);">
    <div style="position:absolute; inset: 18px; background: rgba(255,255,255,0.70); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.30); border-radius: var(--radius-md); padding: 12px 16px; box-shadow: var(--shadow-sm); display:flex; align-items:center; gap:12px;">
      <div style="width:32px; height:32px; border-radius: 8px; background: linear-gradient(135deg, #4f7df7 0%, #2c5be8 100%); display:flex; align-items:center; justify-content:center;">
        <i data-lucide="trending-up" style="width:18px; height:18px; color:#fff;"></i>
      </div>
      <div>
        <div style="font-size:13px; font-weight:700; color: var(--fg-strong);">Nifty Strategist</div>
        <div style="font-size:11px; color: var(--fg-muted);">Glass topbar — bg-white/70 + blur-xl + 1px border</div>
      </div>
    </div>
  </div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
