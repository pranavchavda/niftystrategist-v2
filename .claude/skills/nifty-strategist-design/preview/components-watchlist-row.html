<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — watchlist row</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:8px;">
  <div class="ns-eyebrow">Watchlist row</div>
  <div style="background: var(--bg-surface); border:1px solid var(--border-default); border-radius: var(--radius-md); overflow:hidden;">
    <div style="display:flex; align-items:center; justify-content:space-between; padding:8px 12px; ">
        <div style="min-width:0;">
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:13px; font-weight:700; color: var(--fg-strong);">TATAMOTORS</span>
            <i data-lucide="bell" style="width:10px; height:10px; color: var(--amber-500);"></i>
          </div>
          <div style="font-size:11px; color: var(--fg-subtle);">Tata Motors</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <svg width="48" height="20" viewBox="0 0 48 20"><polyline points="0,16 8,14 16,12 24,11 32,9 40,7 48,5" fill="none" stroke="var(--profit-text-light)" stroke-width="1.5"/></svg>
          <div style="text-align:right; min-width:64px;">
            <div class="ns-num" style="font-size:13px; font-weight:700; color: var(--fg-strong);">952</div>
            <div class="ns-num" style="font-size:11px; font-weight:600; color:var(--profit-text-light);">+1.98%</div>
          </div>
        </div>
      </div><div style="display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-top:1px solid var(--border-subtle);">
        <div style="min-width:0;">
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:13px; font-weight:700; color: var(--fg-strong);">ADANIENT</span>
            
          </div>
          <div style="font-size:11px; color: var(--fg-subtle);">Adani Enterprises</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <svg width="48" height="20" viewBox="0 0 48 20"><polyline points="0,16 8,14 16,12 24,11 32,9 40,7 48,5" fill="none" stroke="var(--profit-text-light)" stroke-width="1.5"/></svg>
          <div style="text-align:right; min-width:64px;">
            <div class="ns-num" style="font-size:13px; font-weight:700; color: var(--fg-strong);">3,150</div>
            <div class="ns-num" style="font-size:11px; font-weight:600; color:var(--profit-text-light);">+2.77%</div>
          </div>
        </div>
      </div><div style="display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-top:1px solid var(--border-subtle);">
        <div style="min-width:0;">
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:13px; font-weight:700; color: var(--fg-strong);">SUNPHARMA</span>
            
          </div>
          <div style="font-size:11px; color: var(--fg-subtle);">Sun Pharma</div>
        </div>
        <div style="display:flex; align-items:center; gap:12px;">
          <svg width="48" height="20" viewBox="0 0 48 20"><polyline points="0,5 8,7 16,10 24,9 32,12 40,14 48,16" fill="none" stroke="var(--loss-text-light)" stroke-width="1.5"/></svg>
          <div style="text-align:right; min-width:64px;">
            <div class="ns-num" style="font-size:13px; font-weight:700; color: var(--fg-strong);">1,724</div>
            <div class="ns-num" style="font-size:11px; font-weight:600; color:var(--loss-text-light);">-0.46%</div>
          </div>
        </div>
      </div>
  </div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
