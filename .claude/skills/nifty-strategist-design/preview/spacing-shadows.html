<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — shadow elevation</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Shadows · elevation</div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:14px; padding: 6px 4px 16px;">
    
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:56px; height:56px; background:#fff; border-radius:12px; box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.05); border:1px solid #e4e4e7;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">shadow-xs</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:56px; height:56px; background:#fff; border-radius:12px; box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1); border:1px solid #e4e4e7;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">shadow-sm</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:56px; height:56px; background:#fff; border-radius:12px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); border:1px solid #e4e4e7;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">shadow-md</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:56px; height:56px; background:#fff; border-radius:12px; box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); border:1px solid #e4e4e7;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">shadow-lg</div>
      </div>
    
      <div style="display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="width:56px; height:56px; background:#fff; border-radius:12px; box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); border:1px solid #e4e4e7;"></div>
        <div style="font-size:11px; color: var(--fg-strong); font-weight:600;">shadow-xl</div>
      </div>
    
  </div>
  <div class="ns-helper">Cards default to <strong style="color:var(--fg-strong);">sm</strong>; interactive hover lifts to <strong style="color:var(--fg-strong);">md</strong>; modals at <strong style="color:var(--fg-strong);">2xl</strong>. FABs use tinted brand shadows.</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
