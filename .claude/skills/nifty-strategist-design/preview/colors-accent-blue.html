<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — accent blue</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Accent · blue</div>
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:6px;"><div class="swatch">
  <div class="chip" style="background:#eff6ff; "></div>
  <div class="name">50</div>
  <div class="hex">#eff6ff</div>
</div><div class="swatch">
  <div class="chip" style="background:#dbeafe; "></div>
  <div class="name">100</div>
  <div class="hex">#dbeafe</div>
</div><div class="swatch">
  <div class="chip" style="background:#bfdbfe; "></div>
  <div class="name">200</div>
  <div class="hex">#bfdbfe</div>
</div><div class="swatch">
  <div class="chip" style="background:#93c5fd; "></div>
  <div class="name">300</div>
  <div class="hex">#93c5fd</div>
</div><div class="swatch">
  <div class="chip" style="background:#60a5fa; "></div>
  <div class="name">400</div>
  <div class="hex">#60a5fa</div>
</div><div class="swatch">
  <div class="chip" style="background:#3b82f6; "></div>
  <div class="name">500</div>
  <div class="hex">#3b82f6</div>
</div><div class="swatch">
  <div class="chip" style="background:#2563eb; "></div>
  <div class="name">600</div>
  <div class="hex">#2563eb</div>
</div><div class="swatch">
  <div class="chip" style="background:#1d4ed8; "></div>
  <div class="name">700</div>
  <div class="hex">#1d4ed8</div>
</div><div class="swatch">
  <div class="chip" style="background:#1e40af; "></div>
  <div class="name">800</div>
  <div class="hex">#1e40af</div>
</div><div class="swatch">
  <div class="chip" style="background:#1e3a8a; "></div>
  <div class="name">900</div>
  <div class="hex">#1e3a8a</div>
</div></div>
  <div class="ns-helper"><strong style="color:var(--fg-strong);">blue-600</strong> is the logo gradient, links, info badges, and every focus ring.</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
