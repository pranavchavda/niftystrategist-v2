<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — zinc neutral ramp</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Neutral · zinc</div>
  <div style="display:grid; grid-template-columns: repeat(11, 1fr); gap:6px;"><div class="swatch">
  <div class="chip" style="background:#fafafa; "></div>
  <div class="name">50</div>
  <div class="hex">#fafafa</div>
</div><div class="swatch">
  <div class="chip" style="background:#f4f4f5; "></div>
  <div class="name">100</div>
  <div class="hex">#f4f4f5</div>
</div><div class="swatch">
  <div class="chip" style="background:#e4e4e7; "></div>
  <div class="name">200</div>
  <div class="hex">#e4e4e7</div>
</div><div class="swatch">
  <div class="chip" style="background:#d4d4d8; "></div>
  <div class="name">300</div>
  <div class="hex">#d4d4d8</div>
</div><div class="swatch">
  <div class="chip" style="background:#a1a1aa; "></div>
  <div class="name">400</div>
  <div class="hex">#a1a1aa</div>
</div><div class="swatch">
  <div class="chip" style="background:#71717a; "></div>
  <div class="name">500</div>
  <div class="hex">#71717a</div>
</div><div class="swatch">
  <div class="chip" style="background:#52525b; "></div>
  <div class="name">600</div>
  <div class="hex">#52525b</div>
</div><div class="swatch">
  <div class="chip" style="background:#3f3f46; "></div>
  <div class="name">700</div>
  <div class="hex">#3f3f46</div>
</div><div class="swatch">
  <div class="chip" style="background:#27272a; "></div>
  <div class="name">800</div>
  <div class="hex">#27272a</div>
</div><div class="swatch">
  <div class="chip" style="background:#18181b; "></div>
  <div class="name">900</div>
  <div class="hex">#18181b</div>
</div><div class="swatch">
  <div class="chip" style="background:#09090b; "></div>
  <div class="name">950</div>
  <div class="hex">#09090b</div>
</div></div>
  <div class="ns-helper">The only neutral in the system — surfaces, text, borders all derive from this ramp.</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
