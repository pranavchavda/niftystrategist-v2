<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Colors — brand amber</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Brand · amber</div>
  <div style="display:grid; grid-template-columns: repeat(10, 1fr); gap:6px;"><div class="swatch">
  <div class="chip" style="background:#fffbeb; "></div>
  <div class="name">50</div>
  <div class="hex">#fffbeb</div>
</div><div class="swatch">
  <div class="chip" style="background:#fef3c7; "></div>
  <div class="name">100</div>
  <div class="hex">#fef3c7</div>
</div><div class="swatch">
  <div class="chip" style="background:#fde68a; "></div>
  <div class="name">200</div>
  <div class="hex">#fde68a</div>
</div><div class="swatch">
  <div class="chip" style="background:#fcd34d; "></div>
  <div class="name">300</div>
  <div class="hex">#fcd34d</div>
</div><div class="swatch">
  <div class="chip" style="background:#fbbf24; "></div>
  <div class="name">400</div>
  <div class="hex">#fbbf24</div>
</div><div class="swatch">
  <div class="chip" style="background:#f59e0b; "></div>
  <div class="name">500</div>
  <div class="hex">#f59e0b</div>
</div><div class="swatch">
  <div class="chip" style="background:#d97706; "></div>
  <div class="name">600</div>
  <div class="hex">#d97706</div>
</div><div class="swatch">
  <div class="chip" style="background:#b45309; "></div>
  <div class="name">700</div>
  <div class="hex">#b45309</div>
</div><div class="swatch">
  <div class="chip" style="background:#92400e; "></div>
  <div class="name">800</div>
  <div class="hex">#92400e</div>
</div><div class="swatch">
  <div class="chip" style="background:#78350f; "></div>
  <div class="name">900</div>
  <div class="hex">#78350f</div>
</div></div>
  <div class="ns-helper"><strong style="color:var(--fg-strong);">amber-500</strong> is the primary brand color — active watchlist tab, "Ask AI" sparkle, FAB chat, focus accents on trading actions.</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
