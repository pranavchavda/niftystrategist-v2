<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — KPI card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">KPI card</div>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
    <div style="display:flex; gap:10px; align-items:center; padding:10px 12px; border-radius: var(--radius-md); background: var(--bg-surface); border:1px solid var(--border-default); box-shadow: var(--shadow-xs);">
        <div style="width:32px; height:32px; flex-shrink:0; border-radius: var(--radius-sm); background: var(--bg-muted); display:flex; align-items:center; justify-content:center; color: var(--fg-muted);"><i data-lucide="wallet" style="width:16px; height:16px;"></i></div>
        <div style="min-width:0;">
          <div class="ns-eyebrow" style="color: var(--fg-muted); letter-spacing:0.08em; font-size:10px;">Total value</div>
          <div class="ns-num" style="font-size:14px; font-weight:700; color:var(--fg-strong);">₹10,43,250</div>
          
        </div>
      </div><div style="display:flex; gap:10px; align-items:center; padding:10px 12px; border-radius: var(--radius-md); background: var(--bg-surface); border:1px solid var(--border-default); box-shadow: var(--shadow-xs);">
        <div style="width:32px; height:32px; flex-shrink:0; border-radius: var(--radius-sm); background: var(--bg-muted); display:flex; align-items:center; justify-content:center; color: var(--fg-muted);"><i data-lucide="trending-up" style="width:16px; height:16px;"></i></div>
        <div style="min-width:0;">
          <div class="ns-eyebrow" style="color: var(--fg-muted); letter-spacing:0.08em; font-size:10px;">Day P&L</div>
          <div class="ns-num" style="font-size:14px; font-weight:700; color:var(--profit-text-light);">+₹4,320</div>
          <div class="ns-num" style="font-size:10px; color:var(--profit-text-light); opacity:.8;">+0.42%</div>
        </div>
      </div><div style="display:flex; gap:10px; align-items:center; padding:10px 12px; border-radius: var(--radius-md); background: var(--bg-surface); border:1px solid var(--border-default); box-shadow: var(--shadow-xs);">
        <div style="width:32px; height:32px; flex-shrink:0; border-radius: var(--radius-sm); background: var(--bg-muted); display:flex; align-items:center; justify-content:center; color: var(--fg-muted);"><i data-lucide="trending-up" style="width:16px; height:16px;"></i></div>
        <div style="min-width:0;">
          <div class="ns-eyebrow" style="color: var(--fg-muted); letter-spacing:0.08em; font-size:10px;">Total P&L</div>
          <div class="ns-num" style="font-size:14px; font-weight:700; color:var(--profit-text-light);">+₹43,250</div>
          <div class="ns-num" style="font-size:10px; color:var(--profit-text-light); opacity:.8;">+4.33%</div>
        </div>
      </div>
  </div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
