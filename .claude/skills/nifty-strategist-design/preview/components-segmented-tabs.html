<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components — segmented tabs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Segmented tabs · positions table</div>
  <div style="display:flex; gap:4px;">
    
      <button style="border:0; padding:6px 10px; border-radius: var(--radius-sm); cursor:pointer; font-size:12px; font-weight:600; background: var(--zinc-900); color:#fff;">Open (5)</button>
    
      <button style="border:0; padding:6px 10px; border-radius: var(--radius-sm); cursor:pointer; font-size:12px; font-weight:600; background:transparent; color: var(--fg-muted);">Holdings (2)</button>
    
      <button style="border:0; padding:6px 10px; border-radius: var(--radius-sm); cursor:pointer; font-size:12px; font-weight:600; background:transparent; color: var(--fg-muted);">Trades (5)</button>
    
      <button style="border:0; padding:6px 10px; border-radius: var(--radius-sm); cursor:pointer; font-size:12px; font-weight:600; background:transparent; color: var(--fg-muted);">Mutual funds (3)</button>
    
  </div>
  <div class="ns-eyebrow">Filter pills · watchlist groups</div>
  <div style="display:flex; gap:4px;">
    
      <button style="border:0; padding:4px 10px; border-radius: var(--radius-sm); cursor:pointer; font-size:11px; font-weight:600; background: rgba(245,158,11,0.15); color: var(--amber-700);">Momentum</button>
    
      <button style="border:0; padding:4px 10px; border-radius: var(--radius-sm); cursor:pointer; font-size:11px; font-weight:600; background: transparent; color: var(--fg-muted);">Swing</button>
    
      <button style="border:0; padding:4px 10px; border-radius: var(--radius-sm); cursor:pointer; font-size:11px; font-weight:600; background: transparent; color: var(--fg-muted);">Long-term</button>
    
  </div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
