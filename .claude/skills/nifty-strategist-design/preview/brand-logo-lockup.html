<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — logo lockup</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-canvas);
    padding: 16px 20px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .card-grid { display: grid; gap: 12px; }
  .row { display: flex; align-items: center; gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .swatch { display: flex; flex-direction: column; gap: 4px; }
  .swatch .chip {
    width: 100%; height: 56px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
  }
  .swatch .name {
    font-size: var(--text-2xs); color: var(--fg-strong);
    font-weight: var(--weight-semibold);
  }
  .swatch .hex {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--fg-muted);
    font-feature-settings: "tnum" 1;
  }
  .specimen { color: var(--fg-strong); }
  .ds-bg-canvas { background: var(--bg-canvas); }
  .ds-bg-surface { background: var(--bg-surface); }
</style>
</head>
<body>

<div class="col" style="gap:10px;">
  <div class="ns-eyebrow">Navbar lockup</div>
  <div style="background: rgba(255,255,255,0.70); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(228,228,231,0.50); border-bottom: 1px solid rgba(228,228,231,0.50); border-radius: var(--radius-md); padding: 10px 14px; display:flex; align-items:center; gap:10px;">
    <i data-lucide="trending-up" style="width:24px; height:24px; color: var(--blue-600); stroke-width: 1.75;"></i>
    <span style="font-size:14px; font-weight:600; color: var(--fg-strong);">Nifty Strategist</span>
    <span style="margin-left:auto; font-size:11px; color: var(--fg-muted);">In the topbar — ArrowTrendingUpIcon, 24px, blue-600, stroke 1.75</span>
  </div>
  <div class="ns-helper">The chrome lockup uses the icon-alone form (no app-icon background) — small, blue, friendly. The full app-icon is used only in PWA / OS surfaces.</div>
</div>

<script>if (window.lucide) lucide.createIcons({ attrs: { 'stroke-width': 2 } });</script>
</body>
</html>
